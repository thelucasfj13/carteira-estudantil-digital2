spring.application.name=carteira-estudantil
server.port=8080

# Database - H2 para desenvolvimento standalone
spring.datasource.url=jdbc:h2:file:./data/carteira_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=CartEiraEstUdAntiLDigitaL2024SecretKeyMuitoSeguraParaProducao123456789
jwt.expiration=86400000

# Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.path=./uploads

# App URL
app.base-url=http://localhost:8000